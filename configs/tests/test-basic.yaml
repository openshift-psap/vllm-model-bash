# Per-model configuration with scenarios
model:
  name: meta-llama/Llama-3.1-8B-Instruct
  base_params: "--max-model-len 8192 --gpu-memory-utilization 0.9"

# Global defaults for all scenarios in this model
defaults:
  bench:
    concurrencies: [1, 2]
    input_len:  128
    output_len: 128
    cc_mult:    10
    result_prefix: results
  env:
    HF_HOME: "/mnt/data"
    HF_TOKEN: ""
    HF_HUB_OFFLINE: "1"
    TORCH_CUDA_ARCH_LIST: "9.0"
    CUDA_VISIBLE_DEVICES: "0"
    VLLM_NVTX_SCOPES_FOR_PROFILING: "1"
  study_dir: "Study_Test"

scenarios:
  # Scenario 1: Baseline (no special flags)
  - name: baseline
    port: 8000
    params: "--async-scheduling"
    bench:
      result_prefix: "measure_baseline"

  # Scenario 2: Async scheduling
  - name: async_scheduling
    port: 8000
    params: "--no-async-scheduling"
    bench:
      result_prefix: "measure_noasync_scheduling"

  # Scenario 3: Baseline (no special flags)
  - name: baseline_fp8
    model: RedHatAI/Meta-Llama-3.1-8B-Instruct-FP8
    port: 8000
    params: "--async-scheduling"
    bench:
      result_prefix: "measure_baseline_fp8"

  # Scenario 2: Async scheduling
  - name: async_scheduling_fp8
    model_name: RedHatAI/Meta-Llama-3.1-8B-Instruct-FP8
    port: 8000
    params: "--no-async-scheduling"
    bench:
      result_prefix: "measure_noasync_scheduling_fp8"
